name: Deploy Clinic Site

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - '**.css'
      - '**.js'
      - '**.json'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      tenant_id:
        description: 'Tenant to deploy'
        required: true
        default: 'hisham'

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Site Structure
        run: |
          echo "Tenant: ${{ github.event.inputs.tenant_id || 'hisham' }}"
          echo "Site files:"
          ls -la
          test -f index.html || (echo "Missing index.html" && exit 1)
          echo "✓ index.html exists"
          echo "✓ Build validation complete"

      - name: Deploy to Vercel (Production)
        uses: vercel/action-deploy@v1
        if: github.ref == 'refs/heads/main'
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod'

      - name: Post Deploy Status
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"
          echo "Tenant: hisham"
          echo "URL: https://dr-hisham-clinic.vercel.app"
