<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Clinic website powered by Agent55-OS.">
  <title>Agent55-OS Clinic</title>

  <!-- Theme tokens + tenant config injected at "build time" (staging) -->
  <script>
    window.TENANT_CONFIG = {
      "tenant_id": "hisham",
      "clinic_name": "The Specialized First Clinic",
      "specialization": "otorhinolaryngology",
      "localization": {
        "default_lang": "en",
        "supported_langs": ["en", "ar"]
      },
      "theme_tokens": {
        "variant": "clinical-minimalist",
        "primary_color": "#0B2545",
        "secondary_color": "#134074",
        "typography": "sans-serif"
      },
      "active_modules": [
        "hero_consultant_profile",
        "ent_clinical_accordion",
        "whatsapp_direct_routing",
        "patient_intake_triage_v1",
        "floating_ai_concierge_v1"
      ],
      "module_data": {
        "whatsapp_direct_routing": {
          "phone_number": "+962XXXXXXXXX",
          "prefilled_message": "Hello Dr. Hisham, I would like to request an expert clinical evaluation."
        },
        "floating_ai_concierge_v1": {
          "greeting_message": "Hello, how can I help you today?",
          "system_prompt_path": "/prompts/clinic_concierge.txt"
        }
      },
      "compliance_boundary": {
        "static_hosting_region": "us-east-1",
        "phi_storage_region": "supabase-aws-[region]",
        "baas_provider": "supabase",
        "baas_endpoint": null,
        "baas_status": "active-sprint001-sandbox"
      }
    };
  </script>

  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="a55-layout safe-area-top safe-area-bottom safe-area-left safe-area-right">
    <!-- Semantic layout positions — engine will inject modules here -->
    <header id="a55-hero" class="a55-hero" role="banner"></header>
    <main  id="a55-body" class="a55-body" role="main"></main>
    <section id="a55-cta" class="a55-cta" role="region" aria-label="Call to action"></section>
  </div>

  <!-- Floating modules are appended to <body> by layoutEngine.js, outside this flow -->

  <script src="layoutEngine.js"></script>
</body>
</html>
